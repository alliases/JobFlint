services:
  db:
    image: postgres:15-alpine
    container_name: jobflint_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: jobflint_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: jobflint_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: jobflint_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn app.main:create_app --host 0.0.0.0 --port 8000 --factory

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: jobflint_worker
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    command: taskiq worker app.broker:broker --workers 4

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: jobflint_scheduler
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    command: taskiq scheduler app.scheduler:scheduler

volumes:
  postgres_data:
  